<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Pick Consulting — Launching July 9, 2026</title>
  <meta name="description" content="Smart Pick Consulting launches July 9, 2026. Legacy data transformed. Credit union operations simplified." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-900: #070e1a;
      --navy-800: #0a1628;
      --navy-700: #0f1f38;
      --teal-400: #7cc5c9;
      --teal-500: #3b9da5;
      --slate-300: #c5cedb;
      --slate-400: #8b99af;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy-900);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
    }

    /* Subtle background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(59,157,165,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* ── Logo ── */
    .logo {
      width: min(420px, 85vw);
      height: auto;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .headline .accent {
      background: linear-gradient(135deg, var(--teal-500), var(--teal-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Countdown ── */
    .countdown-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-500);
    }

    .countdown {
      display: flex;
      gap: clamp(1rem, 3vw, 2.5rem);
      align-items: flex-start;
      justify-content: center;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .unit-value {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 40%, var(--teal-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: clamp(3rem, 10vw, 6rem);
    }

    .unit-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--slate-400);
    }

    .separator {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      color: var(--teal-500);
      opacity: 0.4;
      line-height: 1;
      padding-top: 0.1em;
    }

    /* Launched state */
    .launched-msg {
      display: none;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--teal-500), var(--teal-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .container > * {
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .container > *:nth-child(1) { animation-delay: 0.05s; }
    .container > *:nth-child(2) { animation-delay: 0.2s;  }
    .container > *:nth-child(3) { animation-delay: 0.35s; }
    .container > *:nth-child(4) { animation-delay: 0.5s;  }

    @media (prefers-reduced-motion: reduce) {
      .container > * { animation: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <img
      src="assets/logo.png"
      alt="Smart Pick Consulting"
      class="logo"
    />

    <!-- Hero headline -->
    <h1 class="headline">
      Legacy data, <span class="accent">transformed.</span><br />
      Credit union operations, simplified.
    </h1>

    <!-- Countdown -->
    <p class="countdown-label">Launching in</p>

    <div class="countdown" id="countdown" role="timer" aria-live="polite" aria-label="Countdown to launch">
      <div class="unit">
        <span class="unit-value" id="days">00</span>
        <span class="unit-label">Days</span>
      </div>
      <div class="separator" aria-hidden="true">:</div>
      <div class="unit">
        <span class="unit-value" id="hours">00</span>
        <span class="unit-label">Hours</span>
      </div>
      <div class="separator" aria-hidden="true">:</div>
      <div class="unit">
        <span class="unit-value" id="minutes">00</span>
        <span class="unit-label">Minutes</span>
      </div>
      <div class="separator" aria-hidden="true">:</div>
      <div class="unit">
        <span class="unit-value" id="seconds">00</span>
        <span class="unit-label">Seconds</span>
      </div>
    </div>

    <p class="launched-msg" id="launchedMsg">We're live. Welcome.</p>

  </div>

  <footer class="footer">© 2026 Smart Pick Consulting · smart-pick.co</footer>

  <script>
    // ── LAUNCH DATE ──────────────────────────────────────────────────────────
    // July 9, 2026 at 9:00 AM Eastern (EDT = UTC-4)
    const LAUNCH = new Date('2026-07-09T09:00:00-04:00');

    const els = {
      days:        document.getElementById('days'),
      hours:       document.getElementById('hours'),
      minutes:     document.getElementById('minutes'),
      seconds:     document.getElementById('seconds'),
      countdown:   document.getElementById('countdown'),
      launchedMsg: document.getElementById('launchedMsg'),
    };

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now  = Date.now();
      const diff = LAUNCH.getTime() - now;

      if (diff <= 0) {
        // Launched — hide timer, show message
        els.countdown.style.display   = 'none';
        els.launchedMsg.style.display = 'block';
        document.querySelector('.countdown-label').style.display = 'none';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const d = Math.floor(totalSeconds / 86400);
      const h = Math.floor((totalSeconds % 86400) / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;

      els.days.textContent    = pad(d);
      els.hours.textContent   = pad(h);
      els.minutes.textContent = pad(m);
      els.seconds.textContent = pad(s);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
